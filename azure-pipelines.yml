# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build image
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Docker@2
      displayName: Build an image
      inputs:
        command: build
        dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        tags: |
          $(tag)
    - task: PublishCodeCoverageResults@2
      inputs:
        summaryFileLocation: "$(System.DefaultWorkingDirectory)/**/site/report/report.xml" # Path to summary files
        reportDirectory: "$(System.DefaultWorkingDirectory)/**/site/report" # Path to report directory
        failIfCoverageEmpty: true # Fail if code coverage results are missing
